# ESP32-S3 Edge AI Gateway V2 Project Configuration
# 多模态 AI 升级方案 (毫米波雷达 + 麦克风)

# ================================================================
# GPIO Support
# ================================================================
CONFIG_GPIO=y

# ================================================================
# Serial/UART Support (调试控制台 + 雷达通信)
# ================================================================
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_ASYNC_API=y
CONFIG_UART_ESP32=y

# ================================================================
# I2S Support (麦克风 INMP441)
# ================================================================
CONFIG_I2S=y
CONFIG_I2S_INIT_PRIORITY=70

# ================================================================
# PSRAM (N16R8模块 8MB Octal SPI)
# ================================================================
CONFIG_ESP_SPIRAM=y
CONFIG_ESP_SPIRAM_MODE_OCT=y

# ================================================================
# DSP Support (FFT for MFCC)
# ================================================================
CONFIG_DSP=y
CONFIG_DSP_RES=y

# ================================================================
# Logging
# ================================================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PRINTK=y

# ================================================================
# Console
# ================================================================
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# ================================================================
# 内核配置
# ================================================================
CONFIG_MAIN_THREAD_PRIORITY=10
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
CONFIG_MAIN_STACK_SIZE=8192

# ================================================================
# Networking Support
# ================================================================
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y

# ================================================================
# WiFi Support
# ================================================================
CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POLL_MAX=4

# ================================================================
# Network Buffer Configuration
# ================================================================
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_BUF_DATA_SIZE=128

# ================================================================
# DNS Client
# ================================================================
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_SERVER_IP_ADDRESSES=y

# ================================================================
# SNTP Time Sync
# ================================================================
CONFIG_SNTP=y

# ================================================================
# HTTP Client
# ================================================================
CONFIG_HTTP_CLIENT=y

# ================================================================
# JSON Parser
# ================================================================
CONFIG_JSON_LIBRARY=y

# ================================================================
# TensorFlow Lite Micro
# ================================================================
CONFIG_TENSORFLOW_LITE_MICRO=y

# ================================================================
# 多线程配置
# ================================================================
CONFIG_NUM_COOP_PRIORITIES=16
CONFIG_NUM_PREEMPT_PRIORITIES=16

# ================================================================
# 堆内存配置
# ================================================================
CONFIG_HEAP_MEM_POOL_SIZE=65536