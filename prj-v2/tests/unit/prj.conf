# Unit Test Configuration

# ================================================================
# ZTest Framework
# ================================================================
CONFIG_ZTEST=y
CONFIG_ZTEST_ASSERT_VERBOSE=1
CONFIG_ZTEST_MOCKING=y
CONFIG_TEST=y

# ================================================================
# Test-specific settings
# ================================================================
CONFIG_TEST_EXTRA_STACK_SIZE=2048
CONFIG_MAIN_STACK_SIZE=4096

# ================================================================
# Logging for tests
# ================================================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PRINTK=y

# ================================================================
# Console（native_sim 下不启用 UART console，避免引入板级依赖）
# ================================================================
# CONFIG_CONSOLE=y
# CONFIG_UART_CONSOLE=y

# ================================================================
# Minimal dependencies for pure logic/unit tests
# - 避免 ESP32 专用 Kconfig 在 native_sim 上产生告警并被当作错误
# ================================================================
CONFIG_GPIO=y
CONFIG_SERIAL=n

# Kernel
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# ================================================================
# Heap memory (for k_malloc)
# ================================================================
CONFIG_HEAP_MEM_POOL_SIZE=65536
