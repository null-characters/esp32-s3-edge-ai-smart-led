# ESP32-S3 Edge AI Gateway Project Configuration
# Phase 1: 基础硬件通信模块

# ================================================================
# GPIO Support
# ================================================================
CONFIG_GPIO=y

# ================================================================
# Serial/UART Support (驱动板通信 + 调试控制台)
# ================================================================
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_ASYNC_API=y
CONFIG_UART_ESP32=y

# ================================================================
# PSRAM (N16R8模块 8MB Octal SPI)
# ================================================================
CONFIG_ESP_SPIRAM=y
# CONFIG_ESP_SPIRAM_SIZE is set via DTS in overlay

# ================================================================
# Logging
# ================================================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PRINTK=y

# ================================================================
# Console
# ================================================================
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# ================================================================
# 内核配置
# ================================================================
CONFIG_MAIN_THREAD_PRIORITY=10
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# ================================================================
# Networking Support
# ================================================================
CONFIG_NETWORKING=y
CONFIG_NET_NATIVE=y

# ================================================================
# WiFi Support (Phase 2: WF-001)
# ================================================================
CONFIG_WIFI=y
CONFIG_WIFI_ESP32=y
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_IPV4=y
CONFIG_NET_UDP=y
CONFIG_NET_DHCPV4=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_SOCKETS_POLL_MAX=4

# ================================================================
# Network Buffer Configuration
# ================================================================
CONFIG_NET_PKT_RX_COUNT=16
CONFIG_NET_PKT_TX_COUNT=16
CONFIG_NET_BUF_RX_COUNT=32
CONFIG_NET_BUF_TX_COUNT=32
CONFIG_NET_BUF_DATA_SIZE=128

# ================================================================
# DNS Client (WF-012)
# ================================================================
CONFIG_DNS_RESOLVER=y
CONFIG_DNS_SERVER_IP_ADDRESSES=y

# ================================================================
# SNTP Time Sync (WF-006 ~ WF-010)
# ================================================================
CONFIG_SNTP=y

# ================================================================
# HTTP Client (WF-011 ~ WF-015)
# ================================================================
CONFIG_HTTP_CLIENT=y

# ================================================================
# JSON Parser (WF-022)
# ================================================================
CONFIG_JSON_LIBRARY=y

# ================================================================
# Thread Stack Size (WiFi thread needs more)
# ================================================================
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=4096
