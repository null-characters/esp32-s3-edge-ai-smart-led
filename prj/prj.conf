# ESP32-S3 Edge AI Gateway Project Configuration
# Phase 1: 基础硬件通信模块

# ================================================================
# GPIO Support
# ================================================================
CONFIG_GPIO=y

# ================================================================
# Serial/UART Support (驱动板通信 + 调试控制台)
# ================================================================
CONFIG_SERIAL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_UART_ASYNC_API=y
CONFIG_UART_ESP32=y

# ================================================================
# PSRAM (N16R8模块 8MB Octal SPI)
# ================================================================
CONFIG_ESP_SPIRAM=y
# CONFIG_ESP_SPIRAM_SIZE is set via DTS in overlay

# ================================================================
# Logging
# ================================================================
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_LOG_PRINTK=y

# ================================================================
# Console
# ================================================================
CONFIG_CONSOLE=y
CONFIG_UART_CONSOLE=y

# ================================================================
# 内核配置
# ================================================================
CONFIG_MAIN_THREAD_PRIORITY=10
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048
